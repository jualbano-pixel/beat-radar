name: Weekly Editorial Scrape

on:
  schedule:
    # Monday 8:00 AM Asia/Manila is Monday 00:00 UTC.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scraper
        env:
          AI_TECH_TIME_MODE: current

      - name: Commit updated editorial outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output latest
          if git diff --cached --quiet; then
            echo "No editorial output changes to commit."
          else
            git commit -m "chore: update weekly editorial outputs"
            git push
          fi
